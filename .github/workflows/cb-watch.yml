name: cb-watch
on:
  schedule:
    - cron: '10 22 * * *'      # KST 07:10 (유증 스캔 07:00 직후)
  workflow_dispatch:
jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests
      - name: scan
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cb_watch.py --days 3
      - name: render
        run: python render_cb.py
      - name: commit
        run: |
          git config user.name  "cb-watch-bot"
          git config user.email "actions@github.com"
          git add data/ cb.html
          git diff --cached --quiet || git commit -m "cb-watch: $(date +%F)"
          git push
